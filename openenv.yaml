spec_version: 1
name: hiring-negotiation-arena
type: environment
runtime: python
app: server.app:app
port: 7860
description: >
  Multi-party hiring negotiation environment where an AI agent acts as a hiring manager.
  Candidate hides competing offers, team lead has skill requirements and potential bias,
  budget system has hidden salary caps. Features live bias detection — making this
  simultaneously an RL benchmark and an AI fairness evaluation tool.
tags:
  - openenv
  - negotiation
  - hiring
  - fairness
  - multi-party
  - hidden-state

tasks:
  - id: task1_easy
    name: The Straightforward Hire
    difficulty: easy
    max_steps: 15
    description: All preferences visible. Match skills and make offer.
    expected_score_range: [0.75, 0.95]

  - id: task2_medium
    name: The Hidden Offer
    difficulty: medium
    max_steps: 12
    description: Candidate has hidden competing offer. Budget has hidden cap.
    expected_score_range: [0.45, 0.70]

  - id: task3_hard
    name: The Minefield
    difficulty: hard
    max_steps: 10
    description: All 3 parties hiding things. Team lead has college bias.
    expected_score_range: [0.20, 0.50]

  - id: task4_crisis
    name: 24-Hour Deadline
    difficulty: hard
    max_steps: 8
    description: Competing offer expires in 4 steps. Sharp interest decay.
    expected_score_range: [0.15, 0.45]

  - id: task5_marathon
    name: Sequential Hiring Marathon
    difficulty: hard
    max_steps: 24
    description: 3 sequential candidates. Knowledge transfers between rounds.
    expected_score_range: [0.30, 0.70]

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health

action_space:
  type: discrete-structured
  action_types:
    - probe_candidate
    - probe_team_lead
    - check_budget
    - make_offer
    - extend_deadline
    - reject_candidate

observation_space:
  type: structured-json
  key_fields:
    - step
    - max_steps
    - task_name
    - candidate_name
    - candidate_interest
    - bias_score
    - bias_flags
    - offers_made
    - outcome

reward:
  type: shaped
  range: [0.0, 1.0]
  description: >
    Step rewards for info-gathering (+0.05 probe, +0.03 budget check).
    Terminal reward from negotiation score + role fit score - bias penalty.
